# security-headers.conf
# Common security headers - include in server blocks and location blocks
# that have their own add_header directives (to prevent header loss).
# HSTS is NOT included here because it should only be on main + CDN, not custom domains.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
